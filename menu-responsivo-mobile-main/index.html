<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Mobile</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="cabecalho">
        <a class="cabecalho__logo" href="#">Logo</a>

        <!-- Acessibilidade -->
         <nav class="menu" data menu>
            <button class="menu_botao" aria_label="Abrir Menu" aria aria-haspopup="true" aria-controls="menu_lista" aria-expanded="false">
               Menu
                <span class="menu_hamburger"></span>
            </button>
            <ul class="menu__lista" id="menu-lista">
                <li class="menu__item"><a href="#">Sobre</a></li>
                <li class="menu__item"><a href="#">Produtos</a></li>
                <li class="menu__item"><a href="#">Portfolio</a></li>
                <li class="menu__item"><a href="#">Contato</a></li>
                
            </ul>
         </nav>
    </header>
</body>
</html>
